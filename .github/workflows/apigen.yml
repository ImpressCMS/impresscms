name: ApiGen

on:
  push:
    branches:
      - 2.0.x

jobs:
  Document_Generator:
    runs-on: ubuntu-latest
    steps:
    - name: Checkounting...
      uses: actions/checkout@v2

    - name: 📝 ApiGen PHP Document Generator
      uses: varunsridharan/action-apigen@2.1
      with:
        source_folder: 'htdocs/libraries/icms/'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

