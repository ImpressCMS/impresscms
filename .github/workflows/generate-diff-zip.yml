name: Generate Diff Files

on:
  workflow_dispatch:
    inputs:
      old_version:
        description: 'Old version (e.g. v2.0.0)'
        required: true
      new_version:
        description: 'New version (e.g. v2.0.2)'
        required: true

jobs:
  generate-diff-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history

      - name: Create diff files and removed.txt
        run: |
          # Create a temporary directory for changed files and removed.txt
          mkdir -p diff_files

          # Get commit hashes for the specified versions
          OLD_COMMIT=$(git rev-parse "${{ github.event.inputs.old_version }}")
          NEW_COMMIT=$(git rev-parse "${{ github.event.inputs.new_version }}")

          # Generate a list of modified/added files (excluding deleted), filtered to htdocs/
          git diff --name-only --diff-filter=AMR "$OLD_COMMIT" "$NEW_COMMIT" | grep ^htdocs/ | sed 's|^htdocs/||' > changed_files.txt

          # Generate a list of deleted files, filtered to htdocs/
          git diff --name-only --diff-filter=D "$OLD_COMMIT" "$NEW_COMMIT" | grep ^htdocs/ | sed 's|^htdocs/||' > removed.txt

          # Copy modified/added files to the temporary directory, using htdocs/ as root
          while IFS= read -r file; do
            if [ -f "htdocs/$file" ]; then
              mkdir -p "diff_files/$(dirname "$file")"
              cp "htdocs/$file" "diff_files/$file"
            fi
          done < changed_files.txt

          # Copy removed.txt to the root of the diff_files directory
          cp removed.txt diff_files/removed.txt

      - name: Upload diff_files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: diff_${{ github.event.inputs.old_version }}_to_${{ github.event.inputs.new_version }}
          path: diff_files/
